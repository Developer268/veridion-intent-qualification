name: Run Classifier

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run solution.py
        run: python solution.py

      - name: Show results
        run: |
          echo "=== final_results.csv ==="
          cat final_results.csv

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: final_results
          path: final_results.csv

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add final_results.csv
          git diff --cached --quiet || git commit -m "ci: update final_results.csv from classifier run"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
